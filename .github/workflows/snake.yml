name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Houria-hs
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=FFB7D5&color_dots=%230D1117,%23291B2C,%236F2D5C,%23D16BA5,%23F8BBD0

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
